services:
  oracle:
    image: "ghcr.io/rube-de/chatbot-jailbreak:0.1.22"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - CONTRACT_ADDRESS=0xc251737606087f0465Cc597EdDaDdF16d9EEe34F
    # Removed --ollama-address from entrypoint
    entrypoint: /bin/sh -c 'python main.py --network https://testnet.sapphire.oasis.io $${CONTRACT_ADDRESS}'
    restart: on-failure
    volumes:
      - /run/rofl-appd.sock:/run/rofl-appd.sock
