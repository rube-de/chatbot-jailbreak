services:
  oracle:
    image: "ghcr.io/rube-de/chatbot-jailbreak:or"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - CONTRACT_ADDRESS=0xBB333702465ea39eF0367490550C30B2515eE2CD
    # Removed --ollama-address from entrypoint
    entrypoint: /bin/sh -c 'python main.py --network https://testnet.sapphire.oasis.io $${CONTRACT_ADDRESS}'
    restart: on-failure
    volumes:
      - /run/rofl-appd.sock:/run/rofl-appd.sock
